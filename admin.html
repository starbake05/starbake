<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STARBAKE Admin</title>

  <link rel="stylesheet" href="admin.css">
</head>

<body>

<div class="sidebar">

    <h2>⭐ STARBAKE</h2>

<a href="#" class="active">📊 Dashboard</a>
<a href="#">📦 Produk</a>
<a href="#">📂 Kategori</a>
<a href="#">🖼 Banner</a>
<a href="#">🎁 Promo</a>
<a href="#">📋 Pesanan</a>
<a href="#">⚙ Pengaturan</a>
<a href="#">🚪 Logout</a>

</div>

<div class="content">

<h1>Dashboard Admin</h1>

<p>Selamat datang di Dashboard STARBAKE.</p>
<div class="stats">

    <div class="card">
        <h3>Total Produk</h3>
        <h2>0</h2>
    </div>

    <div class="card">
        <h3>Kategori</h3>
        <h2>8</h2>
    </div>

    <div class="card">
        <h3>Pesanan Hari Ini</h3>
        <h2>0</h2>
    </div>

</div>
<button id="addProduct">
+ Tambah Produk
</button>
<input
type="text"
id="searchProduct"
placeholder="🔍 Cari nama produk..."
>
<div id="productModal" class="modal">

  <div class="modal-content">

    <h2>Tambah Produk</h2>

    <label>Nama Produk</label>
    <input type="text" id="productName">

    <label>Harga</label>
    <input type="number" id="productPrice">

    <label>Kategori</label>
    <select id="productCategory">
      <option>Roti Satuan</option>
      <option>Roti Bakar</option>
      <option>Pizza</option>
      <option>Burger</option>
      <option>Sandwich</option>
      <option>Hotdog</option>
      <option>Drinks</option>
      <option>Coffee</option>
    </select>

    <label>Status Produk</label>

<div class="status-group">

<label>
<input type="radio"
name="productStatus"
value="Tersedia"
checked>

🟢 Tersedia
</label>

<label>
<input type="radio"
name="productStatus"
value="Habis">

🔴 Habis
</label>

</div>

    <label>Foto Produk</label>

<input type="file" id="productImage" accept="image/*">

<div class="image-preview">

<img id="previewImage"
src="https://placehold.co/150x150?text=Preview"
alt="Preview">

</div>

    <div class="modal-buttons">
      <button id="saveProduct">Simpan</button>
      <button id="closeModal">Batal</button>
    </div>

  </div>

</div>
<hr>

<h2>Daftar Produk</h2>

<table>

<thead>

<tr>

<th>SKU</th>

<th>Foto</th>

<th>Produk</th>

<th>Kategori</th>

<th>Harga</th>

<th>Status</th>

<th>Aksi</th>

</tr>

</thead>

<tbody id="productTable">
</tbody>

</table>

</div>

<script src="admin.js"></script>

</body>
</html>
